<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Thư viện AI Agent - Trường Đại học Hải Phòng</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="ultra-wrapper">
        <!-- Sidebar -->
        <div class="ultra-sidebar">
            <div class="logo-box">
                <span class="logo-icon">📚</span>
                <h2>HPUni Library</h2>
                <p>Thủ thư AI Agent thông minh</p>
                <div style="margin-top: 10px;">
                    <span class="online-indicator"></span>
                    <span style="font-size: 11px;">Online</span>
                </div>
            </div>
            
            <div class="category-title">
                📖 DANH MỤC SÁCH
            </div>
            
            <div class="category-list">
                <button class="cat-btn" onclick="quickSearch('sách công nghệ thông tin')">💻 Công nghệ thông tin</button>
                <button class="cat-btn" onclick="quickSearch('sách kinh tế')">📊 Kinh tế </button>
                <button class="cat-btn" onclick="quickSearch('sách du lịch')">✈️ Du lịch</button>
                <button class="cat-btn" onclick="quickSearch('sách ngoại ngữ')">🌐 Ngoại ngữ</button>
                <button class="cat-btn" onclick="quickSearch('sách toán')">🔬 Toán & KHTN</button>
            </div>
            
            <div class="sidebar-footer">
                <button id="theme-toggle" class="cat-btn" onclick="toggleTheme()" style="margin-bottom: 10px; text-align: center; justify-content: center;">🌞 Chế độ sáng</button>
                <a href="/admin" target="_blank">⚙️ Quản trị hệ thống</a>
                <div style="margin-top: 15px; text-align: center; font-size: 11px;">
                    © 2026 - Trường Đại học Hải Phòng
                    <br>ĐỀ TÀI NGHIÊN CỨU KHOA HỌC
                </div>
            </div>
        </div>
        
        <!-- Chat Area -->
        <div class="ultra-chat">
            <div class="chat-header">
               <div class="bot-avatar">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Đại học Hải Phòng">
                </div>
                <div class="bot-info">
                    <h3> Thủ thư AI Agent - Trường Đại học Hải Phòng</h3>
                    <p> Hỏi đáp về sách 24/7 • Tư vấn, hỗ trợ tìm kiếm tài liệu</p>
                </div>
            </div>
            
            <div class="chat-box" id="chat-box"></div>
            
            <div class="chat-input-area">
                <div class="typing-indicator" id="typing">
                    <span></span><span></span><span></span>
                </div>
                
                <div class="input-wrapper">
                    <input type="text" id="chat-input" placeholder="Nhập tên sách, tác giả, danh mục...">
                    <button class="send-btn" id="send-btn">Gửi</button>
                </div>
                
                <div style="display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;">
                    <span style="color: #666; font-size: 12px;">Gợi ý:</span>
                    <button class="quick-action-btn" onclick="quickSearch('sách cntt')">📚 Công nghệ thông tin</button>
                    <button class="quick-action-btn" onclick="quickSearch('sách kinh tế')">📊 Kinh tế</button>
                    <button class="quick-action-btn" onclick="quickSearch('python')">🐍 Python</button>
                    <button class="quick-action-btn" onclick="quickSearch('machine learning')">🤖 Machine Learning </button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
